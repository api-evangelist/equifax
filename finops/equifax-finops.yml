specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Equifax
providerId: equifax
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Credit Bureau
  - Identity
  - Verification
description: 'FOCUS-aligned FinOps for Equifax: per-pull / per-inquiry billing on contracted unit prices,
  invoiced monthly. Pricing is custom and not publicly listed; meters reflect typical bureau billing
  lines.'
sources:
  - https://developer.equifax.com/products
  - https://www.equifax.com
notes: No public pricing; meter unit prices must be reconciled with your Equifax contract.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Equifax Inc.
serviceCategory: Credit Bureau / Identity Data
billingModel:
  pricingCategory: Pay-Per-Inquiry / Custom Contract
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Equifax
  ServiceCategory: Credit Bureau / Identity Data
  ProviderName: Equifax
  PublisherName: Equifax Inc.
  InvoiceIssuerName: Equifax Inc.
  BillingCurrency: USD
meters:
  - name: credit_inquiries
    unit: inquiry
    aggregation: sum
    dimensions:
      - product
      - permissible_purpose
      - subscriber_code
  - name: identity_checks
    unit: check
    aggregation: sum
    dimensions:
      - product
  - name: verification_pulls
    unit: pull
    aggregation: sum
    dimensions:
      - product
  - name: marketing_records
    unit: record
    aggregation: sum
    dimensions:
      - audience
  - name: subscription_fees
    unit: month
    aggregation: sum
    dimensions:
      - product
principles:
  - name: Visibility
    description: Reconcile monthly Equifax invoices against your subscriber-code-level usage logs; instrument
      every API call with the permissible-purpose and product code.
  - name: Allocation
    description: Tag inquiries with consuming business unit and decision context (origination, account
      management, marketing) so cost is allocable.
  - name: Optimization
    description: Use prescreen / batch services for marketing rather than individual pulls; cache where
      FCRA permits; renegotiate unit prices at volume tier inflection points.
  - name: Accountability
    description: Compliance and finance jointly own bureau spend; risk owners must justify pull volume
      against business outcomes.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
