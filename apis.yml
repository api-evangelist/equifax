aid: equifax
name: Equifax
description: >-
  Equifax is a consumer credit reporting agency that collects and aggregates
  information on individuals' credit history, including borrowing and repayment
  habits. This information is used by lenders and creditors to assess
  creditworthiness and make decisions about extending credit. Equifax also
  offers identity theft protection, credit monitoring, and fraud detection
  services, plus analytics and consulting offerings to help businesses manage
  risk.
