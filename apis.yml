apis:
  - aid: equifax:equifax
    name: Equifax API
    description: >-
      The Equifax API platform provides programmatic access to Equifax's
      consumer credit information, including credit reports, credit scores,
      identity verification, and fraud detection. APIs are organized into
      categories that include Payment and Transaction, Geo/Location, Identity,
      Data Append, and Mobile, with featured products such as OneView,
      WalletInsights, Talent Report, PowerLead Check, Verification Exchange,
      Score Only, and OFAC Alert. Developer access is gated through the
      Equifax Developer Portal.
    humanURL: https://developer.equifax.com/
