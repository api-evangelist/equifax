description: >-
  Equifax is a consumer credit reporting agency that collects and aggregates information
  on individuals' credit history, including their borrowing and repayment habits.
  This information is used by lenders and creditors to assess an individual's creditworthiness
  and make decisions about extending credit. Equifax also offers identity theft protection
  services, credit monitoring, and fraud detection services to help consumers protect
  their sensitive financial information.
