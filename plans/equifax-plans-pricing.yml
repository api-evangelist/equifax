specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Equifax
providerId: equifax
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Credit Bureau
  - Identity
  - Fraud Prevention
  - Consumer Data
  - Verification
description: Equifax is a regulated US credit bureau and data broker. Its developer portal lists products
  across Credit Risk, Identity & Fraud, Verification, Workforce Management, and Marketing, but does not
  publish a public price list. Access is contracted per product and per use-case (FCRA-compliant) with
  per-inquiry / per-pull pricing negotiated directly with Equifax sales.
sources:
  - https://developer.equifax.com/products
  - https://www.equifax.com
notes: No public pricing for Equifax APIs. Pricing is per-product, per-pull, or per-inquiry, negotiated
  via contract; specific rates depend on use-case eligibility, volume, and regulatory category (FCRA
  vs non-FCRA).
plans:
  - id: equifax-credit-risk
    name: Credit Risk Products
    type: enterprise
    description: Credit reports, attributes, scores (FICO, VantageScore, Equifax-developed). Per-pull
      pricing under FCRA-permissible use.
    entries:
      - label: Credit pull
        name: credit_inquiry
        type: metered
        metric: inquiry
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Consumer credit report
      - name: Credit attributes
      - name: Risk scores
  - id: equifax-identity-fraud
    name: Identity & Fraud
    type: enterprise
    description: Identity verification, fraud signals, KYC compliance products.
    entries:
      - label: Identity / fraud check
        name: identity_check
        type: metered
        metric: check
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Identity verification
      - name: Fraud signals
      - name: KYC compliance
  - id: equifax-verification
    name: The Work Number / Verification Services
    type: enterprise
    description: Income and employment verification (The Work Number).
    entries:
      - label: Verification pull
        name: verification_pull
        type: metered
        metric: pull
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Income verification
      - name: Employment verification
  - id: equifax-marketing-data
    name: Data-driven Marketing
    type: enterprise
    description: Demographic, financial, and consumer data for targeted marketing.
    entries:
      - label: Marketing data
        name: marketing_data
        type: metered
        metric: record
        limit: -1
        timeFrame: usage
        geo: US
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Consumer demographics
      - name: Audience segmentation
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
