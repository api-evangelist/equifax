specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Equifax
providerId: equifax
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Credit Bureau
  - Identity
  - Fraud Prevention
description: Equifax does not publish public per-second or per-minute rate-limit numbers. Its developer
  portal confirms HTTP throttling and standard error responses, but actual quotas are set per-customer
  contract and provisioned at the API key/credentials level. Sandbox and production environments are
  separated.
sources:
  - https://developer.equifax.com
  - https://developer.equifax.com/products
notes: No public rate-limit numbers; contract-defined. Replace with the limits provisioned for your specific
  Equifax credentials.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-credentials negotiated limit
    scope: api-credentials
    metric: varies
    limit: contract-defined per customer and product
  - name: Sandbox environment
    scope: sandbox-credentials
    metric: varies
    limit: lower than production; intended for integration testing only
policies:
  - name: Sandbox vs production
    description: Use sandbox credentials for integration testing; production credentials carry FCRA-permissible-use
      attestations and stricter audit logging.
  - name: Backoff
    description: On 429 / 503, apply exponential backoff with jitter; do not retry idempotent reads aggressively
      as inquiries can post to the consumer's bureau record.
  - name: Inquiry minimization
    description: Cache permissible-use results where regulation allows to minimize repeated bureau pulls
      against the same consumer.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
